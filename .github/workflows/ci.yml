name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Format check (Ruff)
        run: uv run ruff format --check .

      - name: Type check (Pyright)
        run: uv run pyright

      - name: Tests (offline — no network, no OpenAI)
        run: uv run pytest -m "not live"

      - name: Eval harness (baseline — free)
        run: uv run python -m langley_risk.evals.run
