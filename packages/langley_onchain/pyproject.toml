[project]
name = "langley-onchain"
version = "0.1.0"
description = "Langley On-Chain Forensics — neutral, evidence-cited on-chain profile of a Solana token"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "langley-risk",
    "openai-agents>=0.17",
    "pydantic>=2.7",
]

[project.scripts]
langley-onchain = "langley_onchain.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/langley_onchain"]

[tool.uv.sources]
langley-risk = { workspace = true }
