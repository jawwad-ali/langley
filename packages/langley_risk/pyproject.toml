[project]
name = "langley-risk"
version = "0.1.0"
description = "Langley Risk Guardian — evidence-cited Solana token risk assessment via the OpenAI Agents SDK"
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "Langley" }]
dependencies = [
    "openai-agents>=0.17",
    "pydantic>=2.7",
    "pydantic-settings>=2.2",
    "httpx>=0.27",
    "tenacity>=8.3",
    "structlog>=24.1",
]

[project.scripts]
langley-risk = "langley_risk.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/langley_risk"]
