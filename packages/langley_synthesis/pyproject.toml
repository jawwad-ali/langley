[project]
name = "langley-synthesis"
version = "0.1.0"
description = "Langley Synthesis Orchestrator — fuses specialist agents into one ranked intelligence report"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "langley-risk",
    "langley-onchain",
    "openai-agents>=0.17",
    "pydantic>=2.7",
]

[project.scripts]
langley-synthesis = "langley_synthesis.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/langley_synthesis"]

[tool.uv.sources]
langley-risk = { workspace = true }
langley-onchain = { workspace = true }
